version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jiangjiao-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    networks:
      - jiangjiao-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jiangjiao-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jiangjiao-network

networks:
  jiangjiao-network:
    driver: bridge

volumes:
  backend-data:
